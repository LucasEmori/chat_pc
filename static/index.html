<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AzimeAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23fafafa'/%3E%3Cpath d='M16 8 L23 24 L9 24 Z' fill='%230a0a0a'/%3E%3C/svg%3E" />
</head>
<body>
<div class="azime-shell" id="shell">
  <!-- Header bar: logo + actions -->
  <header class="azime-header-bar">
    <div id="logo-slot"><!-- logo.svg injetado via JS --></div>
    <div class="azime-header-actions">
      <button class="azime-header-btn hidden" id="new-session-btn" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Nova sessão
      </button>
    </div>
  </header>

  <!-- Topbar (hidden em init) -->
  <div class="azime-topbar hidden" id="topbar">
    <div class="crumb">
      <span>Sessão</span><span class="sep">/</span><span id="crumb-name">Sessão</span>
      <span class="sub" id="crumb-stage"></span>
    </div>
    <span class="spacer"></span>
    <span class="meta-tag"><span class="live"></span> Thread ativa</span>
  </div>

  <!-- Área de conteúdo dinâmica -->
  <main id="stage"><!-- conteúdo injetado por app.js --></main>
</div>

<script src="/js/app.js" defer></script>
</body>
</html>
